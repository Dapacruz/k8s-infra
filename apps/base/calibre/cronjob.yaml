apiVersion: batch/v1
kind: CronJob
metadata:
  name: calibre-weekly-backup
  namespace: calibre
spec:
  schedule: "0 3 * * 0"  # Weekly at 03:00 Sunday
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rsync-backup
              image: alpine:3.23@sha256:25109184c71bdad752c8312a8623239686a9a2071e8825f20acb8f2198c3f659
              command:
                - /bin/sh
                - -c
                - >
                  apk add --no-cache rsync &&
                  rsync -av --delete --no-perms --no-owner --no-group --include='David/***' --include='Jen/***' --include='Alyssa/***' --exclude='*' /calibre-library/ /nas-backup/
              volumeMounts:
                - name: calibre-lib
                  mountPath: /calibre-library
                  subPath: config
                - name: media
                  mountPath: /nas-backup
                  subPath: eBooks
          volumes:
            - name: calibre-lib
              persistentVolumeClaim:
                claimName: calibre-claim
            - name: media
              nfs:
                server: nas.cruznet.io
                path: /volume1/Media
                readOnly: false

