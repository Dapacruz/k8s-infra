apiVersion: batch/v1
kind: CronJob
metadata:
  name: calibre-weekly-backup
  namespace: calibre
spec:
  schedule: "0 3 * * 0"  # Weekly at 03:00 Sunday
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: rsync-backup
              image: alpine:3.19@sha256:6baf43584bcb78f2e5847d1de515f23499913ac9f12bdf834811a3145eb11ca1
              command:
                - /bin/sh
                - -c
                - >
                  apk add --no-cache rsync &&
                  rsync -av --delete \
                    --include='David' \
                    --include='Jen' \
                    --include='Alyssa' \
                    --exclude='*' \
                    /calibre-library/ /nas-backup/
              volumeMounts:
                - name: calibre-lib
                  mountPath: /calibre-library
                - name: media
                  mountPath: /nas-backup
                  subPath: eBooks
          volumes:
            - name: calibre-lib
              persistentVolumeClaim:
                claimName: calibre-claim
            - name: media
              nfs:
                server: nas.cruznet.io
                path: /volume1/Media
                readOnly: false

