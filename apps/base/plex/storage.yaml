apiVersion: v1
kind: PersistentVolume
metadata:
  name: plex-config
spec:
  storageClassName: plex-config
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: driver.longhorn.io
    fsType: ext4
    volumeHandle: plex-config
    volumeAttributes:
      dataLocality: best-effort
      numberOfReplicas: "1"
      staleReplicaTimeout: "30"
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: "30Gi"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex-config-claim
spec:
  storageClassName: plex-config
  volumeName: plex-config
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: "30Gi"
---
