apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-stack
  namespace: prometheus-stack
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.15.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-stack
        namespace: prometheus-stack
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
    - paths:
      - /metadata/annotations/prometheus-operator-validated
      target:
        kind: PrometheusRule
  valuesFrom:
  - kind: ConfigMap
    name: prometheus-stack-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: StatefulSet
              name: prometheus-stack-grafana
            patch: |-
              apiVersion: apps/v1
              kind: StatefulSet
              metadata:
                name: prometheus-stack-grafana
                namespace: prometheus-stack
              spec:
                volumeClaimTemplates:
                  - metadata:
                      name: storage
                      labels:
                        recurring-job.longhorn.io/source: "enabled"
                        recurring-job.longhorn.io/backup-daily-with-weekly-full: "enabled"

